<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录界面</title>
    <link rel="stylesheet" href="css/loginStyle.css">
</head>
<body>
    <div class="login">
        <h2>用户登录</h2>
        <div class="item">
            <label>学号:</label>
            <input type="text" id="username" placeholder="请输入账号">
        </div>
        <div class="item">
            <label>密码:</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button id="loginBtn">登录</button>
        <div id="errorTip"></div>
        <a href="register.html" class="switchLink">注册</a>
    </div>

    <script src="js/loginScript.js"></script>
</body>
</html>
